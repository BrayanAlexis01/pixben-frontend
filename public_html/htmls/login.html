<html lang="es">
<head>
    <title>Login - PixBen</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../imagensponsor/favicon.ico" sizes="any">
    <link rel="icon" type="image/webp" href="../imagensponsor/favicon.webp">
    <link rel="apple-touch-icon" href="../imagensponsor/favicon-192.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#8a2be2">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PixBen">

    <meta name="robots" content="noindex,nofollow">

    <link href="../css/css index.css" rel="stylesheet" type="text/css"/>
    <link href="../css/login.css" rel="stylesheet" type="text/css"/>

    <link href="../css/responsive-global.css?v=2" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="../css/pwa-premium.css?v=2">
    <script src="../js/pwa-premium.js?v=2" defer></script>
</head>

<body>

    <header>

        <div class="logo">
            <a href="../index.html">
                <img src="../imagensponsor/logopixben.webp" alt="">
            </a>
        </div>

        <nav>
            <a href="../index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="personaliza.html">Personaliza</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
        </nav>

    </header>

    <main>

        <div class="login-container">

            <div class="login-card">

                <img src="../imagensponsor/logopixben.webp" alt="">

                <h1>Iniciar Sesión</h1>

                <input
                    type="email"
                    id="correo"
                    placeholder="Correo electrónico">

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña">

                <button id="btnIniciarSesion">
                    Ingresar
                </button>

                <p>
                    ¿No tienes cuenta?
                    <a href="registro.html">
                        Regístrate aquí
                    </a>
                </p>

            </div>

        </div>

    </main>

<script src="../js/config.js?v=14"></script>
<script src="../js/analitica.js?v=3"></script>
<script src="../js/login.js?v=4" type="text/javascript"></script>
    <script src="../js/eventos-html.js?v=1" type="text/javascript"></script>
    <script src="../js/responsive-menu.js?v=4" type="text/javascript"></script>
</body>
</html>
