<body>

<header>
    <div class="logo">
        <a href="../index.html">
            <img src="../imagensponsor/logopixben.webp" alt="">

<nav>

    <a href="personaliza.html">Personaliza</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="contacto.html">Contacto</a>
</nav>


</header>

<main class="registro-container">


<div class="registro-card">

    <h1>Crear cuenta</h1>

    <p>Únete a PixBen y personaliza tu estilo.</p>

    <div class="grupo-input">
        <label>Nombre</label>
        <input type="text" id="nombre">
    </div>

    <div class="grupo-input">
        <label>Apellido</label>
        <input type="text" id="apellido">
    </div>

    <div class="grupo-input">
        <label>Correo electrónico</label>
        <input type="email" id="correo" autocomplete="email" placeholder="ejemplo@gmail.com" required>
        <small class="ayuda-registro">Se aceptan Gmail, Hotmail, Outlook y Live. Las cuentas administrativas existentes no se modifican.</small>
    </div>

    <div class="grupo-input">
        <label>Contraseña</label>
        <input type="password" id="password" autocomplete="new-password" required>
        <small class="ayuda-registro">Mínimo 8 caracteres, con mayúscula, minúscula, número y símbolo.</small>
    </div>

    <div class="grupo-input">
        <label>Confirmar contraseña</label>
        <input type="password" id="confirmarPassword" autocomplete="new-password" required>
    </div>

    <button class="btn-registro"
            id="btnRegistrar">
        Registrarme
    </button>

    <div class="link-login">
        ¿Ya tienes cuenta?
        <a href="login.html">
            Inicia sesión
        </a>
    </div>

</div>
