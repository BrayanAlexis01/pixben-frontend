<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#8a2be2">
    <title>Sin conexión | PixBen</title>
    <link rel="icon" href="/imagensponsor/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/css/pwa-premium.css?v=2">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{min-height:100svh;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at 50% 25%,rgba(138,43,226,.24),transparent 33%),#09050d;color:#fff;font-family:Arial,sans-serif}
        main{width:min(520px,100%);padding:38px 30px;border:1px solid rgba(255,255,255,.12);border-radius:26px;background:rgba(255,255,255,.055);box-shadow:0 28px 80px rgba(0,0,0,.36);text-align:center;backdrop-filter:blur(15px)}
        img{width:92px;height:92px;border-radius:24px;margin-bottom:22px;box-shadow:0 18px 45px rgba(138,43,226,.25)}
        h1{font-size:clamp(1.9rem,7vw,2.6rem);margin-bottom:12px}
        p{color:rgba(255,255,255,.7);line-height:1.65;margin-bottom:26px}
        .acciones{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}
        a,button{min-height:46px;padding:12px 18px;border:0;border-radius:12px;font-weight:800;text-decoration:none;cursor:pointer}
        a{background:#8a2be2;color:#fff}
        button{background:#fff;color:#17101c}
    </style>
</head>
<body>
<main>
    <img src="/imagensponsor/favicon-192.png" alt="PixBen">
    <h1>Estás sin conexión</h1>
    <p>La aplicación no puede cargar esta página todavía. Algunas secciones que ya visitaste siguen disponibles.</p>
    <div class="acciones">
        <button type="button" onclick="location.reload()">Intentar de nuevo</button>
        <a href="/index.html">Ir al inicio</a>
    </div>
</main>
<script src="/js/pwa-premium.js?v=2" defer></script>
</body>
</html>
